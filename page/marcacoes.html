    <!--FORMULARIO-->
    <div class="container mt-5">
      <h2 class="mb-3">Marcação da sua Consulta</h2>
      <p class="text-muted">
        Para esclareceres qualquer dúvida sobre os nossos serviços de psicologia
        online ou marcares a tua consulta online, deixa uma mensagem.
      </p>

      <form>
        <div class="mb-3">
          <input
            type="text"
            class="form-control"
            placeholder="Nome"
            name="nome"
            required
          />
        </div>

        <div class="mb-3">
          <input
            type="email"
            class="form-control"
            placeholder="Email"
            name="email"
            required
          />
        </div>

        <div class="mb-3">
          <input
            type="text"
            class="form-control"
            placeholder="Assunto"
            name="assunto"
          />
        </div>

        <div class="mb-3">
          <textarea
            class="form-control"
            rows="4"
            placeholder="Deixe aqui a sua mensagem"
            name="mensagem"
          ></textarea>
        </div>

        <div class="form-check mb-3">
          <input
            class="form-check-input"
            type="checkbox"
            id="consentimento"
            name="consentimento"
            required
          />
          <label class="form-check-label text-muted small" for="consentimento">
            dou consentimento ao tratamento de dados:
            <u>condições gerais e política de privacidade.</u>
          </label>
        </div>

        <button type="submit" class="btn btn-custom">Enviar Mensagem</button>
      </form>
    </div>
    <!--FIM DO FORMULARIO-->
